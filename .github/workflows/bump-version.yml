name: Bump Version

on:
  push:
    branches:
      - master
    paths-ignore:
      - "custom_components/openinfra_status/manifest.json"

jobs:
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          VERSION=$(jq -r '.version' custom_components/openinfra_status/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

      - name: Determine bump type from commits
        id: bump_type
        run: |
          # Get commit messages since last tag (or all if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log -1 --pretty=format:"%s")
          fi

          # Determine bump type based on conventional commits
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        id: new_version
        run: |
          MAJOR=${{ steps.current.outputs.major }}
          MINOR=${{ steps.current.outputs.minor }}
          PATCH=${{ steps.current.outputs.patch }}
          BUMP=${{ steps.bump_type.outputs.type }}

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping from ${{ steps.current.outputs.version }} to $NEW_VERSION ($BUMP)"

      - name: Check if version changed
        id: check
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.new_version.outputs.version }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update manifest.json
        if: steps.check.outputs.changed == 'true'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          jq --arg v "$NEW_VERSION" '.version = $v' \
            custom_components/openinfra_status/manifest.json > tmp.json \
            && mv tmp.json custom_components/openinfra_status/manifest.json

      - name: Commit and push version bump
        if: steps.check.outputs.changed == 'true'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/openinfra_status/manifest.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
